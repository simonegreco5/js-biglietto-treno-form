<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- sezione bootstrap icon -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- sezione bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- sezione css -->
     <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    
    <div class="card text-center p-4 m-3 bg-secondary">

        <form>
            <!-- (input dell'utente) chilometri da percorre / età -->
            <input type="number" id="km-run" placeholder="distanza da percorrere" required>
            <input type="number" id="user-age" placeholder="la tua età" required>
    
            <button id='button' type="submit">Aggiungi</button>
        </form>

    </div>


    <div class="container mt-5">

        <div class="card text-center">
          <div class="card-header bg-danger text-white">
            <strong>FRECCIA BOOLEAN EXPRESS</strong>
          </div>
          <div class="card-body">
            <h5 class="card-title">il tuo biglietto</h5>

            <table class="table">
               <thead>
                 <tr>
                   <th scope="col">Biglietto n.</th>
                   <th scope="col">Carrozza</th>
                   <th scope="col">Posto</th>
                   <th scope="col">Prezzo</th>
                 </tr>
               </thead>
               <tbody>
                 <tr>
                   <th scope="row" class="numero"></th>
                   <td class="carrozza"></td>
                   <td class="posto"></td>
                   <td class="prezzo"></td>
                 </tr>
               </tbody>
            </table>
            
            <a href="#" class="btn btn-dark"><i class="bi bi-apple"></i> Pay</a>
          </div>
          <div class="card-footer text-body-secondary">
            frecciaboolean.it
          </div>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
